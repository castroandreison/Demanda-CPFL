<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPFL - Cálculo de Demanda</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); display:flex; align-items:center; justify-content:center; z-index:9999; }
        .modal-box { background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius); padding:32px; width:100%; max-width:420px; box-shadow:var(--shadow); max-height:90vh; overflow-y:auto; }
        .modal-box h2 { margin-bottom:20px; text-align:center; color:var(--accent); }
        .modal-box .form-group { margin-bottom:14px; }
        .modal-box .form-group label { display:block; margin-bottom:4px; color:var(--text-secondary); font-size:13px; }
        .modal-box .form-group input, .modal-box .form-group select { width:100%; padding:10px 12px; background:var(--bg-input); border:1px solid var(--border-color); border-radius:var(--radius-sm); color:var(--text-primary); font-size:14px; box-sizing:border-box; }
        .modal-box .form-group input:focus { border-color:var(--border-focus); outline:none; }
        .modal-box .btn-primary { width:100%; padding:12px; border:none; border-radius:var(--radius-sm); background:var(--accent); color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
        .modal-box .btn-primary:hover { background:var(--accent-hover); }
        .modal-box .toggle-link { text-align:center; margin-top:14px; color:var(--text-secondary); font-size:13px; }
        .modal-box .toggle-link a { color:var(--accent); cursor:pointer; }
        .modal-box .error-msg { color:var(--danger); font-size:13px; text-align:center; margin-bottom:10px; display:none; }
        .modal-box .success-msg { color:var(--success); font-size:13px; text-align:center; margin-bottom:10px; display:none; }
        #user-info { display:flex; align-items:center; gap:10px; }
        #user-info .user-name { color:var(--text-secondary); font-size:13px; }
        #user-info .logout-btn { background:none; border:1px solid var(--border-color); color:var(--text-secondary); padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px; }
        #user-info .logout-btn:hover { border-color:var(--danger); color:var(--danger); }
        .nav-admin-link { color:var(--purple) !important; font-weight:600; }
        .admin-panel { margin-top:20px; }
        .admin-panel h3 { color:var(--purple); margin-bottom:16px; }
        .admin-table { width:100%; border-collapse:collapse; }
        .admin-table th, .admin-table td { padding:10px 12px; text-align:left; border-bottom:1px solid var(--border-color); font-size:13px; }
        .admin-table th { color:var(--text-secondary); font-weight:600; background:var(--bg-secondary); }
        .admin-table td { color:var(--text-primary); }
        .admin-table tr:hover td { background:var(--bg-hover); }
        .badge-admin { background:var(--purple); color:#fff; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
        .badge-user { background:var(--bg-hover); color:var(--text-secondary); padding:2px 8px; border-radius:10px; font-size:11px; }
        .proj-link { color:var(--accent); cursor:pointer; text-decoration:underline; font-size:12px; }
        .proj-link:hover { color:var(--accent-hover); }
        .hidden { display:none !important; }
        @media (max-width:768px) {
            .modal-box { margin:16px; padding:20px; }
            .admin-table { font-size:12px; }
            .admin-table th, .admin-table td { padding:6px 8px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <span class="brand-icon">⚡</span>
            CPFL Demanda
        </a>
        <ul class="navbar-nav">
            <li><a href="/" class="{% if request.path == '/' %}active{% endif %}">Início</a></li>
            <li id="nav-ged119" class="hidden"><a href="/ged119" class="{% if request.path == '/ged119' %}active{% endif %}">GED-119</a></li>
            <li id="nav-ged13" class="hidden"><a href="/ged13" class="{% if request.path == '/ged13' %}active{% endif %}">GED-13</a></li>
            <li id="admin-link-li" class="hidden"><a href="/admin" class="nav-admin-link">🔧 Admin</a></li>
        </ul>
        <div id="user-info">
            <span id="user-name-display" class="user-name hidden"></span>
            <button id="login-btn" class="btn btn-sm" style="padding:4px 12px;font-size:12px;">Entrar</button>
            <button id="logout-btn" class="logout-btn hidden">Sair</button>
        </div>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h2 id="auth-title">Entrar</h2>
            <div id="auth-error" class="error-msg"></div>
            <div id="auth-success" class="success-msg"></div>
            <div id="login-form">
                <div class="form-group"><label>Usuário</label><input type="text" id="login-username" autocomplete="username"></div>
                <div class="form-group"><label>Senha</label><input type="password" id="login-password" autocomplete="current-password"></div>
                <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
                <div class="toggle-link">Não tem conta? <a onclick="mostrarCadastro()">Cadastre-se</a></div>
                <div class="toggle-link" style="margin-top:4px;"><a onclick="fecharModal()">Cancelar</a></div>
            </div>
            <div id="register-form" class="hidden">
                <div class="form-group"><label>Usuário *</label><input type="text" id="reg-username"></div>
                <div class="form-group"><label>Senha *</label><input type="password" id="reg-password"></div>
                <div class="form-group"><label>Nome Completo *</label><input type="text" id="reg-nome"></div>
                <div class="form-group"><label>Cidade *</label><input type="text" id="reg-cidade"></div>
                <div class="form-group"><label>Concessionária *</label><input type="text" id="reg-concessionaria" placeholder="Ex: CPFL"></div>
                <div class="form-group"><label>Contato (opcional)</label><input type="text" id="reg-contato" placeholder="Telefone / Email"></div>
                <button class="btn-primary" onclick="cadastrar()">Cadastrar</button>
                <div class="toggle-link">Já tem conta? <a onclick="mostrarLogin()">Entrar</a></div>
                <div class="toggle-link" style="margin-top:4px;"><a onclick="fecharModal()">Cancelar</a></div>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let loginLogId = null;

        function fecharModal() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('auth-error').style.display = 'none';
            document.getElementById('auth-success').style.display = 'none';
        }

        function mostrarCadastro() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('auth-title').textContent = 'Cadastro';
            document.getElementById('auth-error').style.display = 'none';
            document.getElementById('auth-success').style.display = 'none';
        }

        function mostrarLogin() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('auth-title').textContent = 'Entrar';
            document.getElementById('auth-error').style.display = 'none';
            document.getElementById('auth-success').style.display = 'none';
        }

        function showAuthError(msg) {
            const el = document.getElementById('auth-error');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('auth-success').style.display = 'none';
        }

        function showAuthSuccess(msg) {
            const el = document.getElementById('auth-success');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('auth-error').style.display = 'none';
        }

        function fazerLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            if (!username || !password) { showAuthError('Preencha usuário e senha'); return; }
            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(r => r.json())
            .then(resp => {
                if (!resp.success) { showAuthError(resp.error); return; }
                currentUser = resp.data;
                atualizarInterface();
                fecharModal();
                if (window.location.pathname === '/') {
                    window.location.reload();
                }
            })
            .catch(() => showAuthError('Erro ao conectar no servidor'));
        }

        function cadastrar() {
            const dados = {
                username: document.getElementById('reg-username').value.trim(),
                password: document.getElementById('reg-password').value,
                nome_completo: document.getElementById('reg-nome').value.trim(),
                cidade: document.getElementById('reg-cidade').value.trim(),
                concessionaria: document.getElementById('reg-concessionaria').value.trim(),
                contato: document.getElementById('reg-contato').value.trim()
            };
            if (!dados.username || !dados.password || !dados.nome_completo || !dados.cidade || !dados.concessionaria) {
                showAuthError('Preencha todos os campos obrigatórios (*)'); return;
            }
            if (dados.password.length < 4) { showAuthError('Senha deve ter no mínimo 4 caracteres'); return; }
            fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            })
            .then(r => r.json())
            .then(resp => {
                if (!resp.success) { showAuthError(resp.error); return; }
                showAuthSuccess('Cadastro realizado com sucesso! Faça login.');
                mostrarLogin();
                document.getElementById('login-username').value = dados.username;
            })
            .catch(() => showAuthError('Erro ao conectar no servidor'));
        }

        function fazerLogout() {
            fetch('/api/auth/logout', { method: 'POST' })
            .then(() => {
                currentUser = null;
                atualizarInterface();
                window.location.href = '/';
            })
            .catch(() => {});
        }

        function atualizarInterface() {
            const loginBtn = document.getElementById('login-btn');
            const logoutBtn = document.getElementById('logout-btn');
            const userNameSpan = document.getElementById('user-name-display');
            const adminLink = document.getElementById('admin-link-li');
            const nav119 = document.getElementById('nav-ged119');
            const nav13 = document.getElementById('nav-ged13');
            if (currentUser) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                userNameSpan.textContent = currentUser.nome_completo || currentUser.username;
                userNameSpan.classList.remove('hidden');
                nav119.classList.remove('hidden');
                nav13.classList.remove('hidden');
                if (currentUser.is_admin) {
                    adminLink.classList.remove('hidden');
                } else {
                    adminLink.classList.add('hidden');
                }
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                userNameSpan.classList.add('hidden');
                nav119.classList.add('hidden');
                nav13.classList.add('hidden');
                adminLink.classList.add('hidden');
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('login-btn').onclick = function() {
                document.getElementById('login-modal').classList.remove('hidden');
                mostrarLogin();
            };
            document.getElementById('logout-btn').onclick = fazerLogout;
            document.getElementById('login-modal').addEventListener('click', function(e) {
                if (e.target === this) fecharModal();
            });
            document.getElementById('login-password').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') fazerLogin();
            });
            document.getElementById('reg-password').addEventListener('keydown', function(e) {
                if (e.key === 'Enter') cadastrar();
            });
            fetch('/api/auth/me')
            .then(r => r.json())
            .then(resp => {
                if (resp.success) {
                    currentUser = resp.data;
                    atualizarInterface();
                    if (window.location.pathname === '/' || window.location.pathname === '') {
                        document.getElementById('main-content')?.classList.remove('hidden');
                    } else if (window.location.pathname === '/ged119' || window.location.pathname === '/ged13') {
                        document.querySelector('.container')?.classList.remove('hidden');
                    }
                } else {
                    const path = window.location.pathname;
                    if (path === '/ged119' || path === '/ged13' || path === '/admin') {
                        window.location.href = '/';
                    } else {
                        setTimeout(function() {
                            const modal = document.getElementById('login-modal');
                            if (modal && !currentUser) {
                                modal.classList.remove('hidden');
                                mostrarLogin();
                            }
                        }, 300);
                    }
                }
            })
            .catch(() => {
                setTimeout(function() {
                    const modal = document.getElementById('login-modal');
                    if (modal) {
                        modal.classList.remove('hidden');
                        mostrarLogin();
                    }
                }, 300);
            });
        });
    </script>
</body>
</html>
